        /* =====================================================
   N9 井川カップ バカラトーナメント - スタイルシート
   
   使用フォント (HTMLの <head> 内に以下を追加してください):
   <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
   ===================================================== */

:root {
  --gold: #C9A84C;
  --gold-bright: #E8C97A;
  --gold-pale: #F5EAC8;
  --gold-dim: rgba(201,168,76,0.15);
  --black: #080706;
  --dark: #0E0C0A;
  --card: #131109;
  --card2: #181510;
  --border: rgba(201,168,76,0.2);
  --border-bright: rgba(201,168,76,0.5);
  --text: #EDE7D8;
  --muted: rgba(232,224,208,0.72);
  --hex: rgba(201,168,76,0.04);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body {
  background: var(--black);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  overflow-x: hidden;
}

/* ── TEXTURE OVERLAY ── */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(201,168,76,0.03) 1px, transparent 0);
  background-size: 32px 32px;
  pointer-events:none;
  z-index:0;
}

/* ── NAV ── */
nav {
  position:fixed;
  top:0;left:0;right:0;
  z-index:100;
  padding:16px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(180deg,rgba(8,7,6,0.95) 0%,transparent 100%);
  backdrop-filter:blur(4px);
}
.nav-logo {
  font-family:'Cinzel',serif;
  font-size:18px;
  font-weight:700;
  color:var(--gold-bright);
  letter-spacing:0.15em;
}
.nav-right {
  font-size:10px;
  letter-spacing:0.4em;
  color:var(--muted);
  font-family:'EB Garamond',serif;
  text-transform:uppercase;
}

/* ── HERO ── */
.hero {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  padding:120px 24px 80px;
  text-align:center;
}

.hero-bg {
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 100% 70% at 50% 30%, rgba(201,168,76,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 50% 50% at 80% 80%, rgba(201,168,76,0.03) 0%, transparent 60%),
    linear-gradient(160deg, #0E0C08 0%, #080706 40%, #0C0A06 100%);
}

/* diagonal gold line accent */
.hero-accent {
  position:absolute;
  top:0;right:0;
  width:1px;height:60%;
  background:linear-gradient(180deg,transparent,var(--gold),transparent);
  opacity:0.3;
}
.hero-accent2 {
  position:absolute;
  bottom:0;left:0;
  width:60%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0.2;
}

.hero-eyebrow {
  font-family:'Cinzel',serif;
  font-size:10px;
  letter-spacing:0.55em;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:32px;
  animation:fadeUp .8s ease both;
  position:relative;
}

.hero-event-name {
  font-family:'Cinzel',serif;
  font-size:clamp(13px,2.5vw,18px);
  letter-spacing:0.4em;
  color:var(--gold-bright);
  font-weight:400;
  margin-bottom:16px;
  animation:fadeUp .8s .1s ease both;
  opacity:0;
  position:relative;
}

.hero-title {
  font-family:'Shippori Mincho',serif;
  font-size:clamp(56px,12vw,120px);
  font-weight:700;
  line-height:1.1;
  letter-spacing:-0.01em;
  margin-bottom:24px;
  position:relative;
  animation:fadeUp .9s .2s ease both;
  opacity:0;
}
.hero-title .line1 {
  display:block;
  background:linear-gradient(135deg,#F2E4C0 0%,#C9A84C 30%,#E8C97A 60%,#C9A84C 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-title .line2 {
  display:block;
  background:linear-gradient(135deg,#C9A84C 0%,#F2E4C0 40%,#C9A84C 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-size:0.72em;
  letter-spacing:0.05em;
  margin-top:8px;
}

.hero-divider {
  display:flex;align-items:center;justify-content:center;gap:16px;
  margin:28px 0;
  animation:fadeUp .8s .35s ease both;
  opacity:0;
  position:relative;
}
.hd-line{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
.hd-line.r{background:linear-gradient(90deg,var(--gold),transparent);}
.hd-crown{font-size:16px;color:var(--gold);}

.hero-meta {
  display:flex;align-items:center;justify-content:center;
  gap:32px;flex-wrap:wrap;
  margin-bottom:40px;
  animation:fadeUp .8s .45s ease both;
  opacity:0;
  position:relative;
}
.meta-item {
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.meta-label {
  font-size:9px;letter-spacing:0.5em;color:var(--muted);text-transform:uppercase;
  font-family:'EB Garamond',serif;
}
.meta-value {
  font-family:'EB Garamond',serif;
  font-size:18px;
  color:var(--gold-bright);
  font-variant-numeric:lining-nums;
  letter-spacing:0.05em;
}
.meta-sep {
  width:1px;height:36px;background:var(--border);
}

.hero-tags {
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
  margin-bottom:48px;
  animation:fadeUp .8s .55s ease both;
  opacity:0;
  position:relative;
}
.hero-tag {
  border:1px solid var(--border-bright);
  padding:9px 26px;
  font-size:13px;
  letter-spacing:0.2em;
  color:var(--gold-pale);
  font-family:'EB Garamond',serif;
}
.hero-tag.featured {
  background:var(--gold-dim);
  border-color:var(--gold);
}

.hero-prize-block {
  border:1px solid var(--border);
  padding:20px 48px;
  position:relative;
  animation:fadeUp .8s .65s ease both;
  opacity:0;
  display:inline-block;
}
.hero-prize-block::before,.hero-prize-block::after {
  content:'◆';position:absolute;color:var(--gold);font-size:7px;
}
.hero-prize-block::before{top:-4px;left:50%;transform:translateX(-50%);}
.hero-prize-block::after{bottom:-4px;left:50%;transform:translateX(-50%);}
.hpb-label {
  font-size:9px;letter-spacing:0.5em;color:var(--gold);text-transform:uppercase;
  font-family:'Cinzel',serif;display:block;margin-bottom:6px;
}
.hpb-amount {
  font-family:'EB Garamond',serif;
  font-size:clamp(40px,8vw,64px);
  font-weight:500;
  color:var(--gold-bright);
  font-variant-numeric:lining-nums;
  line-height:1.1;
}
.hpb-unit{font-size:0.45em;letter-spacing:0.1em;}

.hero-main-copy {
  margin: 20px 0 8px;
  text-align: center;
  animation: fadeUp .85s .28s ease both;
  opacity: 0;
  position: relative;
}
.hero-copy-main {
  font-family: 'Shippori Mincho', serif;
  font-size: clamp(18px, 3.5vw, 28px);
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.08em;
  line-height: 1.5;
  margin-bottom: 8px;
}
.hero-copy-sub {
  font-family: 'Shippori Mincho', serif;
  font-size: clamp(13px, 2vw, 17px);
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 0.15em;
  font-style: italic;
}

.scroll-cue {
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  animation:fadeIn 1s 1.5s ease both;opacity:0;
  pointer-events:none;
}
.scroll-cue span{font-size:8px;letter-spacing:0.5em;color:var(--muted);font-family:'EB Garamond',serif;text-transform:uppercase;}
.scroll-bar{width:1px;height:40px;background:linear-gradient(180deg,var(--gold),transparent);animation:scrollAnim 2s ease-in-out infinite;}
@keyframes scrollAnim{0%,100%{opacity:.3;transform:scaleY(1);}50%{opacity:1;transform:scaleY(1.15);}}

/* ── SECTION WRAPPER ── */
.section-wrap {
  max-width:1120px;
  margin:0 auto;
  padding:100px 24px;
  position:relative;
  z-index:1;
}
.full-divider {
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
}

.section-head {
  margin-bottom:64px;
  text-align:center;
}
.sh-eyebrow {
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:0.6em;color:var(--gold);text-transform:uppercase;
  display:block;margin-bottom:14px;
}
.sh-title {
  font-family:'Shippori Mincho',serif;
  font-size:clamp(28px,5vw,44px);
  font-weight:600;
  background:linear-gradient(135deg,var(--gold-bright),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.3;
}
.sh-sub {
  font-size:14px;color:var(--muted);letter-spacing:0.15em;margin-top:10px;
  font-family:'EB Garamond',serif;
}
.sh-ornament {
  display:flex;align-items:center;justify-content:center;gap:12px;margin-top:20px;
}
.sh-line{width:48px;height:1px;background:var(--border);}
.sh-dot{width:4px;height:4px;background:var(--gold);transform:rotate(45deg);}

/* ── OVERVIEW ── */
.overview-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2px;
  background:var(--border);
}
.ov-card {
  background:var(--card);
  padding:48px 40px;
}
.ov-label {
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:0.5em;color:var(--gold);
  text-transform:uppercase;display:block;margin-bottom:14px;
}
.ov-main {
  font-family:'Shippori Mincho',serif;
  font-size:24px;font-weight:600;
  color:var(--text);margin-bottom:12px;line-height:1.4;
}
.ov-sub {
  font-size:15px;color:var(--muted);line-height:1.9;letter-spacing:0.05em;
}
.ov-highlight {
  display:inline-block;
  padding:5px 14px;
  border:1px solid var(--border);
  font-family:'EB Garamond',serif;
  font-size:14px;color:var(--gold-pale);
  letter-spacing:0.15em;
  margin-top:12px;
}

/* highlights */
.highlights-grid {
  display:grid;grid-template-columns:1fr 1fr;
  gap:16px;margin-top:0;
}
.hl-item {
  display:flex;gap:16px;align-items:flex-start;
  padding:28px 24px;
  border:1px solid var(--border);
  transition:all .3s;
}
.hl-item:hover{border-color:var(--gold);background:var(--gold-dim);}
.hl-icon {
  width:40px;height:40px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;background:rgba(201,168,76,0.05);
}
.hl-text h4{font-size:16px;font-weight:500;margin-bottom:5px;color:var(--text);letter-spacing:0.05em;}
.hl-text p{font-size:13px;color:var(--muted);line-height:1.8;}

/* deposit badge */
.deposit-bar {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0;
  background:var(--border);
  margin-top:2px;
}
.dep-item {
  background:var(--card2);
  padding:24px 40px;
  text-align:center;
  flex-shrink:0;
}
.dep-label{font-size:10px;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;font-family:'Cinzel',serif;display:block;margin-bottom:6px;}
.dep-value{font-family:'EB Garamond',serif;font-size:28px;color:var(--gold-bright);font-variant-numeric:lining-nums;}
.dep-sep{width:1px;height:60px;background:var(--border);flex-shrink:0;align-self:center;}
.dep-note{background:var(--card2);padding:24px 40px;font-size:14px;color:var(--muted);letter-spacing:0.1em;line-height:1.8;text-align:center;flex:1;}

/* ── IKAWA SECTION ── */
.ikawa-wrap {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2px;
  background:var(--border);
}
.ikawa-photo-col {
  background:var(--card);
  position:relative;
  min-height:480px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.ikawa-placeholder {
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);
  border:2px dashed var(--border);
  margin:24px;
  gap:12px;
  position:relative;
  flex:1;
}
.ikawa-placeholder .ph-icon{font-size:48px;opacity:0.3;}
.ikawa-placeholder .ph-text{font-size:11px;letter-spacing:0.3em;color:var(--muted);text-align:center;line-height:1.8;}
.ikawa-photo-badge {
  position:absolute;bottom:24px;left:24px;right:24px;
  background:linear-gradient(135deg,rgba(8,7,6,0.92),rgba(14,12,8,0.9));
  border:1px solid var(--border);
  padding:16px 20px;
}
.ipb-name{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:600;color:var(--gold-bright);}
.ipb-title{font-size:12px;color:var(--muted);letter-spacing:0.2em;margin-top:4px;}
.ikawa-info-col {
  background:var(--card);
  padding:56px 48px;
  display:flex;flex-direction:column;justify-content:center;
}
.ikawa-tag {
  display:inline-block;
  background:var(--gold);
  color:var(--black);
  font-family:'Cinzel',serif;
  font-size:8px;letter-spacing:0.5em;
  padding:4px 14px;
  text-transform:uppercase;
  margin-bottom:20px;
  font-weight:700;
}
.ikawa-headline {
  font-family:'Shippori Mincho',serif;
  font-size:clamp(22px,3.5vw,32px);
  font-weight:700;
  line-height:1.4;
  margin-bottom:20px;
  color:var(--text);
}
.ikawa-desc {
  font-size:15px;color:var(--muted);line-height:2;letter-spacing:0.05em;margin-bottom:32px;
}
.ikawa-features {
  display:flex;flex-direction:column;gap:12px;
}
.ikawa-feat {
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  border-left:2px solid var(--gold);
  background:var(--gold-dim);
  font-size:14px;color:var(--gold-pale);letter-spacing:0.1em;
}

/* ── PRIZE ── */
.prize-total-banner {
  border:1px solid var(--border-bright);
  padding:28px 48px;
  text-align:center;
  margin-bottom:40px;
  background:linear-gradient(135deg,rgba(201,168,76,0.06),transparent);
  position:relative;
}
.ptb-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.5em;color:var(--gold);display:block;margin-bottom:8px;}
.ptb-amount{font-family:'EB Garamond',serif;font-size:clamp(48px,8vw,72px);color:var(--gold-bright);font-variant-numeric:lining-nums;line-height:1;}
.ptb-unit{font-size:0.4em;letter-spacing:0.1em;}

.podium {
  display:grid;
  grid-template-columns:1fr 1.15fr 1fr;
  gap:2px;
  background:var(--border);
  margin-bottom:2px;
}
.podium-item {
  background:var(--card);
  padding:40px 24px 32px;
  text-align:center;
  position:relative;
  overflow:hidden;
  transition:all .3s;
}
.podium-item:hover{background:rgba(201,168,76,0.06);}
.podium-item.champion {
  background:linear-gradient(160deg,rgba(201,168,76,0.1),var(--card));
  border-top:2px solid var(--gold);
}
.podium-rank-circle {
  width:48px;height:48px;
  border:1px solid var(--border-bright);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
  font-family:'EB Garamond',serif;font-size:18px;color:var(--gold);
  font-variant-numeric:lining-nums;
}
.champion .podium-rank-circle{
  background:var(--gold);color:var(--black);border-color:var(--gold);
}
.podium-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:12px;}
.podium-amount{font-family:'EB Garamond',serif;font-size:clamp(36px,5vw,52px);color:var(--gold-bright);font-variant-numeric:lining-nums;line-height:1;}
.podium-amount .unit{font-size:0.42em;letter-spacing:0.1em;}
.podium-note{font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:0.15em;}
.champion-crown{font-size:18px;position:absolute;top:16px;right:20px;opacity:0.8;}

/* ── PRIZE RANKING (vertical) ── */
.prize-ranking {
  display: flex;
  flex-direction: column;
  gap: 2px;
  background: var(--border);
  margin-bottom: 16px;
}
.prize-rank-item {
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 48px;
  transition: all .3s;
}
.prize-rank-item:hover { background: rgba(201,168,76,0.05); }
.prize-rank-item.champion {
  background: linear-gradient(135deg, rgba(201,168,76,0.12), var(--card));
  border-left: 3px solid var(--gold);
  padding: 40px 48px;
}
.pr-left {
  display: flex;
  align-items: center;
  gap: 24px;
}
.pr-circle {
  width: 52px; height: 52px;
  border: 1px solid var(--border-bright);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'EB Garamond', serif;
  font-size: 20px;
  color: var(--gold);
  font-variant-numeric: lining-nums;
  flex-shrink: 0;
}
.pr-circle.gold {
  background: var(--gold);
  color: var(--black);
  border-color: var(--gold);
  width: 64px; height: 64px;
  font-size: 26px;
}
.pr-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.45em;
  color: var(--gold);
  text-transform: uppercase;
}
.pr-right { text-align: right; }
.pr-amount {
  font-family: 'EB Garamond', serif;
  font-size: clamp(36px, 5vw, 56px);
  color: var(--gold-bright);
  font-variant-numeric: lining-nums;
  line-height: 1;
}
.champion .pr-amount { font-size: clamp(48px, 7vw, 80px); }
.pr-unit { font-size: 0.4em; letter-spacing: 0.1em; }
.pr-note { font-size: 12px; color: var(--gold); letter-spacing: 0.2em; margin-top: 6px; font-family: 'EB Garamond', serif; }

.podium { display: none; } /* hide old podium */


.schedule-timeline {
  max-width:760px;margin:0 auto;
}
.st-item {
  display:grid;
  grid-template-columns:110px 1px 1fr;
  gap:0 28px;
  position:relative;
}
.st-time {
  font-family:'EB Garamond',serif;
  font-size:24px;
  color:var(--gold-bright);
  font-variant-numeric:lining-nums;
  text-align:right;
  padding-top:18px;
  line-height:1;
}
.st-track {
  display:flex;flex-direction:column;align-items:center;
}
.st-dot {
  width:9px;height:9px;background:var(--black);
  border:1px solid var(--gold);
  transform:rotate(45deg);margin-top:20px;flex-shrink:0;
}
.st-dot.active{background:var(--gold);}
.st-line{flex:1;width:1px;background:linear-gradient(180deg,var(--border),transparent);}
.st-content {
  padding:14px 0 40px;
}
.st-title{font-size:17px;font-weight:500;letter-spacing:0.05em;margin-bottom:4px;color:var(--text);}
.st-detail{font-size:14px;color:var(--muted);letter-spacing:0.1em;line-height:1.8;}
.st-badge {
  display:inline-block;
  padding:2px 10px;
  font-family:'Cinzel',serif;font-size:7px;
  letter-spacing:0.4em;text-transform:uppercase;
  margin-left:10px;vertical-align:middle;
}
.st-badge.main{background:var(--gold);color:var(--black);}
.st-badge.dinner{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid var(--border);}
.st-highlight {
  margin-top:10px;padding:10px 16px;
  border-left:2px solid var(--gold);
  background:var(--gold-dim);
  font-size:13px;color:var(--gold-pale);line-height:1.8;
}

/* ── ENTRY TIERS ── */
.play-conditions {
  background:var(--card);
  border:1px solid var(--border);
  padding:24px 32px;
  display:grid;
  grid-template-columns:auto repeat(3,1fr);
  gap:24px;
  align-items:center;
  margin-bottom:32px;
}
.pc-head{font-size:11px;color:var(--muted);letter-spacing:0.15em;line-height:1.8;}
.pc-item{text-align:center;}
.pc-label{font-size:8px;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;font-family:'Cinzel',serif;display:block;margin-bottom:6px;}
.pc-val{font-family:'EB Garamond',serif;font-size:20px;color:var(--text);font-variant-numeric:lining-nums;}

.tiers-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:2px;background:var(--border);
}
.tier-card {
  background:var(--card);
  padding:40px 28px;
  position:relative;
  overflow:hidden;
  transition:all .3s;
}
.tier-card:hover{background:rgba(201,168,76,0.05);}
.tier-card.recommended {
  background:linear-gradient(160deg,rgba(201,168,76,0.1),var(--card));
}
.tier-card.recommended::before {
  content:'RECOMMENDED';
  position:absolute;top:0;left:0;right:0;
  background:var(--gold);
  color:var(--black);
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:0.5em;
  text-align:center;padding:5px;font-weight:700;
}
.tier-card.recommended{padding-top:48px;}
.tier-dep-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.4em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:10px;}
.tier-amount{font-family:'EB Garamond',serif;font-size:clamp(28px,3vw,36px);color:var(--gold-bright);font-variant-numeric:lining-nums;line-height:1;margin-bottom:24px;}
.tier-amount .unit{font-size:0.55em;}
.tier-benefits{list-style:none;display:flex;flex-direction:column;gap:10px;}
.tier-benefits li {
  font-size:13px;color:var(--muted);letter-spacing:0.05em;
  padding-left:20px;position:relative;line-height:1.7;
}
.tier-benefits li::before{content:'→';position:absolute;left:0;top:0;color:var(--gold);font-size:12px;line-height:1.7;}
.tier-plan-name{font-size:9px;letter-spacing:0.3em;color:var(--border-bright);text-align:right;margin-top:20px;font-family:'EB Garamond',serif;}

.tier-play-cond {
  margin-top: 20px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
}
.tpc-title {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.4em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.tpc-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid rgba(201,168,76,0.07);
  font-size: 12px;
}
.tpc-row:last-child { border-bottom: none; }
.tpc-label { color: var(--muted); letter-spacing: 0.1em; font-family: 'EB Garamond', serif; }
.tpc-val { color: var(--gold-pale); font-family: 'EB Garamond', serif; font-size: 14px; font-variant-numeric: lining-nums; }

/* ── BENEFITS SUMMARY ── */
.benefits-wrap {
  display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--border);margin-bottom:2px;
}
.benefit-item {
  background:var(--card);padding:40px 36px;
  display:flex;gap:20px;align-items:flex-start;
  transition:all .3s;
}
.benefit-item:hover{background:rgba(201,168,76,0.05);}
.benefit-item.featured{
  background:linear-gradient(135deg,rgba(201,168,76,0.08),var(--card));
  border-left:2px solid var(--gold);
}
.bi-icon{width:44px;height:44px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.bi-body h4{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:600;margin-bottom:6px;color:var(--text);}
.bi-body p{font-size:14px;color:var(--muted);line-height:1.9;}
.bi-tag{display:inline-block;padding:2px 8px;background:var(--gold);color:var(--black);font-size:7px;letter-spacing:0.4em;text-transform:uppercase;font-family:'Cinzel',serif;margin-bottom:8px;font-weight:700;}

/* ── RULES ── */
.rules-intro {
  background:var(--card);border:1px solid var(--border);
  padding:28px 36px;margin-bottom:24px;
  border-left:3px solid var(--gold);
  font-size:15px;line-height:2;color:var(--muted);letter-spacing:0.05em;
}
.rules-grid {
  display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--border);
}
.rule-card {
  background:var(--card);padding:40px 36px;
}
.rule-num {
  font-family:'EB Garamond',serif;
  font-size:48px;font-weight:400;
  color:rgba(201,168,76,0.55);
  line-height:1;display:block;margin-bottom:12px;
  font-variant-numeric:lining-nums;
}
.rule-title {
  font-family:'Shippori Mincho',serif;
  font-size:18px;font-weight:600;
  color:var(--text);margin-bottom:14px;letter-spacing:0.05em;
}
.rule-body {
  font-size:14px;color:var(--muted);line-height:2;letter-spacing:0.05em;
}
.rule-body strong{color:var(--gold-pale);font-weight:500;}
.rule-body .highlight-box {
  margin-top:14px;padding:12px 16px;
  background:var(--gold-dim);
  border-left:2px solid var(--gold);
  font-size:13px;color:var(--gold-pale);
}
.rule-table {
  width:100%;border-collapse:collapse;margin-top:12px;font-size:13px;
}
.rule-table th{
  font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.3em;
  color:var(--gold);text-align:left;padding:8px 12px;
  border-bottom:1px solid var(--border);text-transform:uppercase;
}
.rule-table td{
  padding:8px 12px;color:var(--muted);
  border-bottom:1px solid rgba(201,168,76,0.05);
}
.rule-table tr:last-child td{border-bottom:none;}

/* ── NOTES ── */
.notes-grid{display:flex;flex-direction:column;gap:2px;}
.note-item {
  background:var(--card);
  border:1px solid var(--border);
  padding:28px 36px;
  display:flex;gap:20px;align-items:flex-start;
}
.note-icon{font-size:18px;flex-shrink:0;margin-top:2px;}
.note-body h4{font-size:15px;font-weight:500;color:var(--gold-pale);margin-bottom:6px;letter-spacing:0.05em;}
.note-body p{font-size:14px;color:var(--muted);line-height:1.9;letter-spacing:0.03em;}

/* ── ENTRY CTA ── */
.entry-section {
  background:linear-gradient(135deg,rgba(201,168,76,0.07),transparent);
  border:1px solid var(--border);
  padding:80px 48px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.entry-section::before {
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(201,168,76,0.06),transparent);
}
.entry-eyebrow{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.6em;color:var(--gold);text-transform:uppercase;display:block;margin-bottom:20px;position:relative;}
.entry-title{font-family:'Shippori Mincho',serif;font-size:clamp(28px,5vw,44px);font-weight:700;margin-bottom:12px;position:relative;
  background:linear-gradient(135deg,var(--gold-bright),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.entry-sub{font-size:14px;color:var(--muted);letter-spacing:0.15em;margin-bottom:40px;position:relative;}
.entry-condition {
  display:inline-block;
  border:1px solid var(--border-bright);
  padding:14px 32px;
  font-family:'EB Garamond',serif;
  font-size:16px;color:var(--gold-pale);
  letter-spacing:0.15em;
  margin-bottom:40px;position:relative;
}
.entry-fee {
  font-family:'EB Garamond',serif;
  font-size:clamp(36px,6vw,54px);
  color:var(--gold-bright);
  font-variant-numeric:lining-nums;
  display:block;margin-bottom:48px;position:relative;
  line-height:1.1;
}
.entry-fee-tax {
  font-size:0.28em;
  color:var(--muted);
  letter-spacing:0.2em;
  vertical-align:middle;
  margin-left:8px;
  font-family:'Noto Sans JP',sans-serif;
  font-weight:300;
}
.entry-fee-note{display:none;}
.btn-entry {
  display:inline-block;
  padding:18px 64px;
  background:linear-gradient(135deg,var(--gold-bright),var(--gold));
  color:var(--black);
  font-family:'Cinzel',serif;
  font-size:12px;letter-spacing:0.4em;
  text-transform:uppercase;
  text-decoration:none;
  font-weight:700;
  transition:all .3s;
  position:relative;
}
.btn-entry:hover{
  background:linear-gradient(135deg,var(--gold-pale),var(--gold-bright));
  box-shadow:0 8px 40px rgba(201,168,76,0.35);
}
.entry-line-block {
  margin-top:32px;position:relative;
  display:flex;align-items:center;justify-content:center;gap:0;
}
.line-btn {
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 32px;
  background:#06C755;
  color:#fff;
  font-family:'Noto Sans JP',sans-serif;
  font-size:14px;font-weight:500;
  text-decoration:none;letter-spacing:0.05em;
  margin-top:16px;
  transition:all .3s;
}
.line-btn:hover{background:#05b04b;}
.entry-footnote{font-size:12px;color:var(--muted);margin-top:24px;letter-spacing:0.1em;line-height:2;position:relative;}

/* ── FOOTER ── */
footer {
  border-top:1px solid var(--border);
  padding:48px 24px;
  text-align:center;
}
.footer-logo{font-family:'Cinzel',serif;font-size:28px;font-weight:700;color:var(--gold-bright);letter-spacing:0.2em;display:block;margin-bottom:8px;}
.footer-tagline{font-size:11px;letter-spacing:0.5em;color:var(--muted);text-transform:uppercase;font-family:'EB Garamond',serif;margin-bottom:24px;}
.footer-note{font-size:11px;color:rgba(232,224,208,0.35);line-height:2;letter-spacing:0.05em;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.reveal{opacity:0;transform:translateY(32px);transition:opacity .8s ease,transform .8s ease;}
.reveal.visible{opacity:1;transform:none;}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .overview-grid,.ikawa-wrap,.benefits-wrap,.rules-grid{grid-template-columns:1fr;}
  .tiers-grid{grid-template-columns:1fr 1fr;}
  .podium{grid-template-columns:1fr;}
  .highlights-grid{grid-template-columns:1fr;}
  .play-conditions{grid-template-columns:1fr 1fr;row-gap:16px;}
  nav{padding:16px 20px;}
  .nav-right{display:none;}
  .ikawa-photo-col{min-height:320px;}
  .ikawa-info-col{padding:36px 28px;}
  .prize-rank-item{padding:20px 28px;}
  .prize-rank-item.champion{padding:28px 28px;}
  .pr-amount{font-size:40px;}
  .champion .pr-amount{font-size:52px;}
  .deposit-bar{flex-direction:column;gap:2px;}
  .dep-sep{width:100%;height:1px;}
  .dep-note{text-align:center;width:100%;}
  .ov-card{padding:32px 24px;}
  .lottery-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  .tiers-grid{grid-template-columns:1fr;}
  .hero-meta{gap:12px;flex-direction:column;}
  .meta-sep{display:none;}
  .st-time{font-size:18px;}
  .section-wrap{padding:56px 16px;}
  .hero{padding:100px 16px 64px;}
  .hero-tags{flex-direction:column;align-items:center;gap:8px;}
  .hero-prize-block{padding:20px 32px;}
  .hero-copy-main{font-size:16px;}
  .hero-copy-sub{font-size:13px;}
  .prize-total-banner{padding:20px 24px;}
  .prize-rank-item{padding:16px 20px;flex-direction:column;align-items:flex-start;gap:8px;}
  .pr-right{width:100%;}
  .pr-amount{font-size:36px;}
  .champion .pr-amount{font-size:44px;}
  .ikawa-info-col{padding:28px 20px;}
  .ikawa-headline{font-size:20px;}
  .ikawa-features{gap:8px;}
  .schedule-timeline{padding:0;}
  .st-item{grid-template-columns:80px 1px 1fr;gap:0 16px;}
  .st-title{font-size:14px;}
  .rule-card{padding:28px 20px;}
  .ov-card{padding:28px 20px;}
  .section-head{margin-bottom:40px;}
  .tier-card{padding:28px 20px;}
  .tier-card.recommended{padding-top:44px;}
  .note-item{padding:20px 20px;}
  .entry-section{padding:48px 20px;}
  .btn-entry{padding:16px 36px;font-size:11px;}
  .benefit-item{padding:28px 20px;}
  .podium-item{padding:24px 16px;}
  .sh-title{font-size:26px;}
  footer{padding:40px 16px;}
  .hero-title .line2{font-size:0.65em;}
  .deposit-bar{flex-direction:column;}
  .dep-item{width:100%;}
  .scroll-cue{display:none;}
}
/* UTAGEアニメーション無効化（常時表示） */
.reveal {
  opacity: 1 !important;
  transform: none !important;
  transition: none !important;
}
.scroll-cue {
  display: none !important;
}
